# RULE 4 - Suspicious DNS Query to Dynamic DNS Provider
title: Suspicious DNS Query to Known Dynamic DNS Providers
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: test
description: Detects DNS queries to dynamic DNS services frequently abused by malware for C2 infrastructure. These providers allow attackers to quickly rotate IPs while keeping domain names stable.
references:
    - https://attack.mitre.org/techniques/T1071/004/
    - https://www.cisa.gov/sites/default/files/2023-01/aa23-025a-protecting-against-malicious-use-of-remote-monitoring-and-management-software.pdf
author: Your Name
date: 2025/02/10
modified: 2025/03/01
tags:
    - attack.command_and_control
    - attack.t1071.004
    - attack.t1568.001
logsource:
    category: dns
    product: windows
detection:
    selection:
        QueryName|endswith:
            - '.dyndns.org'
            - '.no-ip.com'
            - '.no-ip.org'
            - '.hopto.org'
            - '.servebeer.com'
            - '.zapto.org'
            - '.ddns.net'
            - '.redirectme.net'
            - '.serveftp.com'
    condition: selection
falsepositives:
    - Legitimate use of dynamic DNS for home lab or remote access by employees
    - Some legitimate IoT devices using DDNS
level: medium

---
# RULE 5 - Windows Registry Run Key Modification for Persistence
title: Suspicious Registry Run Key Modification
id: e5f6a7b8-c9d0-1234-efab-345678901234
status: test
description: Detects modification of Windows Registry Run keys, a common persistence technique used by malware to survive reboots. Covers both HKCU and HKLM hives.
references:
    - https://attack.mitre.org/techniques/T1547/001/
    - https://www.theregister.com/2022/08/17/microsoft_malware_persistence/
author: Your Name
date: 2025/02/15
modified: 2025/03/01
tags:
    - attack.persistence
    - attack.t1547.001
logsource:
    category: registry_set
    product: windows
detection:
    selection:
        TargetObject|contains:
            - '\SOFTWARE\Microsoft\Windows\CurrentVersion\Run'
            - '\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce'
            - '\SOFTWARE\WOW6432Node\Microsoft\Windows\CurrentVersion\Run'
    filter_known_good:
        Details|contains:
            - 'C:\Program Files\Microsoft'
            - 'C:\Program Files (x86)\Microsoft'
            - 'C:\Windows\System32'
            - 'C:\Windows\SysWOW64'
    condition: selection and not filter_known_good
falsepositives:
    - Legitimate software installers adding startup entries
    - Antivirus and security tools registering startup entries
level: medium

---
# RULE 6 - Lateral Movement via PsExec Remote Execution
title: Lateral Movement via PsExec or PsExec-like Tools
id: f6a7b8c9-d0e1-2345-fabc-456789012345
status: test
description: Detects remote execution using PsExec or similar tools that create a service on the remote host. Commonly used by attackers for lateral movement within environments after initial access.
references:
    - https://attack.mitre.org/techniques/T1021/002/
    - https://docs.microsoft.com/en-us/sysinternals/downloads/psexec
author: Your Name
date: 2025/02/20
modified: 2025/03/01
tags:
    - attack.lateral_movement
    - attack.t1021.002
    - attack.t1569.002
logsource:
    product: windows
    service: system
detection:
    selection:
        Provider_Name: 'Service Control Manager'
        EventID: 7045
        ServiceName|contains:
            - 'PSEXESVC'
            - 'psexecsvc'
    selection_commandline:
        ServiceFileName|contains:
            - '\admin$\psexesvc.exe'
            - '\PSEXESVC.exe'
    condition: selection or selection_commandline
falsepositives:
    - Legitimate administrative use of PsExec by IT teams
    - Authorized remote management activities
level: high

---
# RULE 7 - Suspicious Base64 Encoded Payload in Command Line
title: Suspicious Base64 Encoded Payload in Process Command Line
id: a7b8c9d0-e1f2-3456-abcd-567890123456
status: test
description: Detects Base64 encoded content in process command lines, a common obfuscation technique used by malware to conceal payloads from security tools and analysts.
references:
    - https://attack.mitre.org/techniques/T1027/
    - https://redcanary.com/threat-detection-report/techniques/obfuscated-files-or-information/
author: Your Name
date: 2025/03/01
modified: 2025/03/10
tags:
    - attack.defense_evasion
    - attack.t1027
    - attack.execution
    - attack.t1059
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|base64offset|contains:
            - 'http://'
            - 'https://'
            - 'IEX'
            - 'Invoke-Expression'
            - 'DownloadString'
            - 'WebClient'
    condition: selection
falsepositives:
    - Some legitimate administrative tools that use base64 encoding
    - Software deployment scripts in managed environments
level: high
