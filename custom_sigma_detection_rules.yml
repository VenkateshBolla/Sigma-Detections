# ============================================================
# CUSTOM SIGMA DETECTION RULES
# Author: Venkatesh Bolla
# Purpose: Threat Detection for MDR environments
# Each rule maps to MITRE ATT&CK framework
# ============================================================

---
# RULE 1 - Suspicious PowerShell Encoded Command Execution
title: Suspicious PowerShell Encoded Command Execution
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: test
description: Detects PowerShell execution with encoded commands that are commonly used by attackers to obfuscate malicious payloads and bypass script block logging.
references:
    - https://attack.mitre.org/techniques/T1059/001/
    - https://lolbas-project.github.io/lolbas/Binaries/Powershell/
author: Venkatesh Bolla
date: 2025/01/15
modified: 2025/03/01
tags:
    - attack.execution
    - attack.defense_evasion
    - attack.t1059.001
    - attack.t1027
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
    selection_encoded:
        CommandLine|contains:
            - ' -EncodedCommand '
            - ' -enc '
            - ' -ec '
    filter_legitimate:
        CommandLine|contains:
            - 'C:\Windows\system32\WindowsPowerShell'
            - 'C:\Program Files\WindowsPowerShell'
    condition: selection_img and selection_encoded and not filter_legitimate
falsepositives:
    - Legitimate administrative scripts using encoded commands
    - Software deployment tools like SCCM or Intune
level: high

---
# RULE 2 - LSASS Memory Access by Non-System Process (Credential Dumping)
title: LSASS Memory Access by Non-System Process
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: test
description: Detects attempts to access LSASS process memory, which is commonly used by credential dumping tools like Mimikatz to extract credentials. Maps to T1003.001.
references:
    - https://attack.mitre.org/techniques/T1003/001/
    - https://www.elastic.co/blog/detecting-credential-access
author: Your Name
date: 2025/01/20
modified: 2025/03/01
tags:
    - attack.credential_access
    - attack.t1003.001
logsource:
    category: process_access
    product: windows
detection:
    selection:
        TargetImage|endswith: '\lsass.exe'
        GrantedAccess|contains:
            - '0x1010'
            - '0x1410'
            - '0x147a'
            - '0x1fffff'
    filter_system:
        SourceImage|startswith:
            - 'C:\Windows\System32\'
            - 'C:\Windows\SysWOW64\'
        SourceImage|endswith:
            - '\csrss.exe'
            - '\wininit.exe'
            - '\services.exe'
            - '\lsass.exe'
            - '\winlogon.exe'
    condition: selection and not filter_system
falsepositives:
    - AV/EDR software performing legitimate process inspection
    - Windows Defender or other endpoint security tools
level: critical

---
# RULE 3 - Suspicious Scheduled Task Creation via Command Line
title: Suspicious Scheduled Task Creation via schtasks.exe
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: test
description: Detects creation of scheduled tasks using schtasks.exe with suspicious parameters often used for persistence by malware and APT groups.
references:
    - https://attack.mitre.org/techniques/T1053/005/
    - https://thedfirreport.com/2022/02/07/qbot-likes-to-move-it-move-it/
author: Your Name
date: 2025/02/01
modified: 2025/03/01
tags:
    - attack.persistence
    - attack.privilege_escalation
    - attack.t1053.005
logsource:
    category: process_creation
    product: windows
detection:
    selection_img:
        Image|endswith: '\schtasks.exe'
    selection_create:
        CommandLine|contains: '/create'
    selection_suspicious:
        CommandLine|contains:
            - 'AppData\Roaming'
            - 'AppData\Local\Temp'
            - '\Users\Public'
            - 'C:\ProgramData'
            - 'wscript'
            - 'mshta'
            - 'regsvr32'
            - 'rundll32'
    condition: selection_img and selection_create and selection_suspicious
falsepositives:
    - Software installations creating tasks in temp locations (rare)
    - Some legitimate backup or maintenance tools
level: high

